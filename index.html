<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Android-optimized viewport: prevents zoom, covers notches/cutouts -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Android Chrome address bar / notification bar theming -->
    <meta name="theme-color" content="#0A0A0D" />
    <meta name="color-scheme" content="dark" />
    <!-- Android full-screen web app capability -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Dev's personal glow-up habit tracker — skincare, gym, nutrition and more." />
    <meta name="format-detection" content="telephone=no" />
    <title>Glow-Up OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Prevent FOUC — immediate dark background before React hydrates */
      html, body { background: #0A0A0D; margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
